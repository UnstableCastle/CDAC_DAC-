<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 10px; }
        .table-container { max-height: 400px; overflow-y: auto; }
        .section-title { border-left: 4px solid #0d6efd; padding-left: 10px; margin-bottom: 20px; }
    </style>
</head>

<body class="py-5">
    <div class="container">
        <div class="row g-4">
            
            <div class="col-lg-8">
                <div class="card shadow-sm p-4 mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="section-title m-0">Employee Directory</h4>
                        <button class="btn btn-primary" onclick="getdata()">
                            <i class="bi bi-arrow-clockwise"></i> Refresh List
                        </button>
                    </div>
                    
                    <div class="table-container border rounded">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light sticky-top">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Role</th>
                                    <th>Salary</th>
                                    <th>Dept</th>
                                </tr>
                            </thead>
                            <tbody id="tb">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="card shadow-sm p-4">
                    <h5 class="mb-3 text-danger">Quick Actions</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Delete by ID</label>
                            <div class="input-group">
                                <input type="text" id="uid" class="form-control" placeholder="ID to remove">
                                <button class="btn btn-outline-danger" onclick="deleterecord()">Delete</button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Load for Edit</label>
                            <div class="input-group">
                                <input type="text" id="gid" class="form-control" placeholder="ID to edit">
                                <button class="btn btn-outline-primary" onclick="getSingleID()">Fetch Data</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm p-4 mb-4 bg-white border-top border-success border-4">
                    <h5 class="text-success mb-3">Create New</h5>
                    <div class="mb-2">
                        <input type="text" id="uname" class="form-control mb-2" placeholder="Full Name">
                        <input type="text" id="urole" class="form-control mb-2" placeholder="Job Role">
                        <input type="text" id="usalary" class="form-control mb-2" placeholder="Salary">
                        <input type="text" id="udet" class="form-control mb-3" placeholder="Department">
                        <button class="btn btn-success w-100" onclick="addData()">Save Record</button>
                    </div>
                </div>

                <div class="card shadow-sm p-4 bg-white border-top border-warning border-4">
                    <h5 class="text-warning mb-3">Modify Existing</h5>
                    <p class="text-muted small">Fetch an ID first to enable editing.</p>
                    <div class="mb-2">
                        <input type="text" id="nname" class="form-control mb-2" placeholder="Update Name">
                        <input type="text" id="nrole" class="form-control mb-2" placeholder="Update Role">
                        <input type="text" id="nsalary" class="form-control mb-2" placeholder="Update Salary">
                        <input type="text" id="ndet" class="form-control mb-3" placeholder="Update Dept">
                        <button class="btn btn-warning w-100 fw-bold" onclick="updateRecord()">Apply Changes</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
