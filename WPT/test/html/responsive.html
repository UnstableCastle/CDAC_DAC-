<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: black;
            padding-bottom: 50px;
        }
        
        header {
            background-color: white;
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            color: black;
            font-size: 30px;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
        }

        header img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
        }

        .card-img-top {
            height: 270px;
            object-fit: cover; 
            background-color: #222; /* Dark placeholder while loading */
        }
        
        .card {
            border: 2px solid white;
            background-color: #111;
            color: rgb(255, 254, 254);
            transition: all 0.3s ease;
            height: 100%;
        }

        /* .card:hover {
            transform: scale(1.05);
            border-color: #00d4ff;
            z-index: 10;
        } */
        
        .card-title {
            text-align: center;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        
        .card-text {
            text-align: center;
            font-size: 0.85rem;
            color: #aaa;
            font-family: sans-serif; /* Fixed empty property */
        }
    </style>
</head>
<body>
