<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Train Time Table</title>
</head>
<body>

<table border="2" cellspacing="0" cellpadding="8">

    <!-- Title Row -->
    <tr>
        <th colspan="8" style="background-color:yellow;">
            Train time Table
        </th>
    </tr>

    <!-- UP / DOWN Section -->
    <tr>
        <th colspan="4" style="background-color:green; color:white;">
            UP Side Train
        </th>
        <th colspan="4" style="background-color:red; color:white;">
            Down Side Train
        </th>
    </tr>

    <!-- Arrival / Departure -->
    <tr>
        <th colspan="2">Arrival</th>
        <th colspan="2">Departure</th>
        <th colspan="2">Arrival</th>
        <th colspan="2">Departure</th>
    </tr>

    <!-- Train Number / Name -->
    <tr>
        <th>Train Number</th>
        <th>Train Name</th>
        <th>Train Number</th>
        <th>Train Name</th>
        <th>Train Number</th>
        <th>Train Name</th>
        <th>Train Number</th>
        <th>Train Name</th>
    </tr>

</table>

</body>
</html>
