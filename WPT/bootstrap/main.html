<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Streamer Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --sidebar-width: 240px;
            --player-height: 90px;
        }

        body {
            background-color: #121212;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Sidebar - Hidden on mobile, shown on md+ */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #000;
            padding: 1.5rem;
            flex-shrink: 0;
            display: none; 
        }

        @media (min-width: 768px) {
            .sidebar { display: block; }
            .main-wrapper { display: flex; flex-direction: row; height: calc(100vh - var(--player-height)); }
        }

        .nav-link {
            color: #b3b3b3 !important;
            transition: 0.3s;
            padding: 0.5rem 0;
        }

        .nav-link:hover, .nav-link.active { color: white !important; }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background: linear-gradient(to bottom, #1f1f1f, #121212);
        }

        /* Responsive Card Styling */
        .card {
            background-color: #181818;
            border: none;
            transition: 0.3s;
            cursor: pointer;
            padding: 12px;
        }

        .card:hover { background-color: #282828; }

        .card-img-top {
            border-radius: 4px;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .card-title {
            font-size: 0.9rem;
            margin-top: 10px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        /* Player Bar - Sticky Bottom */
        .player-bar {
            height: var(--player-height);
            background-color: #181818;
            border-top: 1px solid #282828;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .play-btn {
            width: 32px;
            height: 32px;
            background: white;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: #4f4f4f;
            border-radius: 2px;
        }

        .progress-fill {
            height: 100%;
            background: #0d6efd;
            width: 30%;
        }

        /* Mobile Adjustments */
        @media (max-width: 576px) {
            .player-bar { height: 80px; }
            .volume-controls { display: none !important; }
            .song-info { width: 60% !important; }
            .player-controls { width: 40% !important; }
        }
    </style>
</head>

<body>

    <div class="main-wrapper flex-grow-1 overflow-hidden">
        <div class="sidebar">
            <h4 class="mb-4"><i class="fab fa-apple"></i> Music</h4>
            <nav class="nav flex-column">
                <a class="nav-link active" href="#"><i class="fas fa-home me-2"></i> Home</a>
                <a class="nav-link" href="#"><i class="fas fa-search me-2"></i> Search</a>
                <a class="nav-link" href="#"><i class="fas fa-layer-group me-2"></i> Library</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="d-md-none mb-3">
                <h4 class="fw-bold"><i class="fab fa-apple"></i> Music</h4>
            </div>

            <h2 class="mb-4 fw-bold display-flex">Recommended</h2>
            
            <div class="row row-cols-2 row-cols-sm-3 row-cols-lg-4 row-cols-xl-5 g-3 g-md-4" id="song-grid">
                </div>
        </div>
    </div>

    <div class="player-bar">
        <div class="song-info d-flex align-items-center" style="width: 30%;">
            <img src="https://via.placeholder.com/50" id="current-img" class="rounded me-2" width="45" height="45">
            <div class="overflow-hidden">
                <div class="text-truncate fw-bold small" id="current-title">Select a song</div>
                <div class="text-muted small text-truncate" id="current-artist">Artist</div>
            </div>
        </div>

        <div class="player-controls d-flex flex-column align-items-center" style="width: 40%;">
            <div class="d-flex align-items-center gap-3 mb-1">
                <button class="btn btn-link text-white d-none d-sm-inline p-0"><i class="fas fa-step-backward"></i></button>
                <button class="play-btn" id="playBtn"><i class="fas fa-play"></i></button>
                <button class="btn btn-link text-white p-0"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="progress-container d-none d-md-block">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="volume-controls d-flex align-items-center justify-content-end" style="width: 30%;">
            <i class="fas fa-volume-up me-2 text-muted small"></i>
            <input type="range" class="form-range w-50" id="volume">
        </div>
    </div>

    <script>
        const songs = [
            { title: "Midnight City", artist: "M83", img: "https://picsum.photos/seed/1/300" },
            { title: "Starboy", artist: "The Weeknd", img: "https://picsum.photos/seed/2/300" },
            { title: "Levitating", artist: "Dua Lipa", img: "https://picsum.photos/seed/3/300" },
            { title: "Heat Waves", artist: "Glass Animals", img: "https://picsum.photos/seed/4/300" },
            { title: "Blinding Lights", artist: "The Weeknd", img: "https://picsum.photos/seed/5/300" },
            { title: "Stay", artist: "The Kid LAROI", img: "https://picsum.photos/seed/6/300" },
            { title: "Industry Baby", artist: "Lil Nas X", img: "https://picsum.photos/seed/7/300" },
            { title: "Bad Habits", artist: "Ed Sheeran", img: "https://picsum.photos/seed/8/300" }
        ];

        const grid = document.getElementById('song-grid');
        
        songs.forEach(song => {
            const col = document.createElement('div');
            col.className = 'col';
            col.innerHTML = `
                <div class="card h-100" onclick="playSong('${song.title.replace(/'/g, "\\'")}', '${song.artist.replace(/'/g, "\\'")}', '${song.img}')">
                    <img src="${song.img}" class="card-img-top" alt="${song.title}">
                    <div class="card-body p-0">
                        <div class="card-title text-white fw-bold">${song.title}</div>
                        <div class="text-muted small">${song.artist}</div>
                    </div>
                </div>
            `;
            grid.appendChild(col);
        });

        const playBtn = document.getElementById('playBtn');
        let isPlaying = false;

        function playSong(title, artist, img) {
            document.getElementById('current-title').innerText = title;
            document.getElementById('current-artist').innerText = artist;
            document.getElementById('current-img').src = img;
            isPlaying = true;
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
        });
    </script>
</body>
</html>
