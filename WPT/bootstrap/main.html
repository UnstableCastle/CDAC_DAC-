<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --sidebar-width: 240px;
            --player-height: 100px;
            --primary-blue: #0d6efd;
        }

        body {
            background-color: #121212;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: #000;
            padding: 1.5rem;
            z-index: 1000;
        }

        .nav-link {
            color: #b3b3b3 !important;
            font-weight: 600;
            padding: 0.8rem 0;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: white !important;
        }

        .nav-link i { margin-right: 15px; width: 20px; }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            height: calc(100vh - var(--player-height));
            overflow-y: auto;
            padding: 2rem;
            padding-bottom: 5rem;
        }

        /* Music Player Bottom Bar */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--player-height);
            background-color: #181818;
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            z-index: 1100;
        }

        /* Song Card Styling */
        .song-card {
            background: #181818;
            border: none;
            border-radius: 8px;
            padding: 15px;
            transition: background 0.3s ease;
            cursor: pointer;
            height: 100%;
        }

        .song-card:hover {
            background: #282828;
        }

        .song-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .song-card h6 {
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-card p {
            font-size: 0.85rem;
            color: #b3b3b3;
            margin-top: 5px;
        }

        /* Player Controls */
        .player-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-btns {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .play-btn {
            width: 35px;
            height: 35px;
            background: white;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }

        .progress-container {
            width: 100%;
            max-width: 500px;
            height: 4px;
            background: #4f4f4f;
            border-radius: 2px;
            margin-top: 10px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary-blue);
            width: 30%;
            border-radius: 2px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #888; }
    </style>
</head>

<body>

    <div class="sidebar">
        <h4 class="mb-4"><i class="fab fa-apple"></i> Music</h4>
        <nav class="nav flex-column">
            <a class="nav-link active" href="#"><i class="fas fa-home"></i> Home</a>
            <a class="nav-link" href="#"><i class="fas fa-search"></i> Search</a>
            <a class="nav-link" href="#"><i class="fas fa-layer-group"></i> Your Library</a>
            <hr style="border-color: #282828;">
            <a class="nav-link" href="#"><i class="fas fa-plus-square"></i> Create Playlist</a>
            <a class="nav-link" href="#"><i class="fas fa-heart"></i> Liked Songs</a>
        </nav>
    </div>

    <div class="main-content">
        <h2 class="mb-4">Recommended for you</h2>
        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-4" id="song-grid">
            </div>
    </div>

    <div class="player-bar">
        <div class="d-flex align-items-center" style="width: 30%;">
            <img src="https://via.placeholder.com/60" id="current-img" class="rounded me-3" width="60" height="60">
            <div class="overflow-hidden">
                <h6 class="mb-0 text-white" id="current-title">Select a song</h6>
                <small class="text-muted" id="current-artist">Artist</small>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-btns">
                <button class="btn btn-link text-muted"><i class="fas fa-random"></i></button>
                <button class="btn btn-link text-white"><i class="fas fa-step-backward"></i></button>
                <button class="play-btn" id="playBtn"><i class="fas fa-play"></i></button>
                <button class="btn btn-link text-white"><i class="fas fa-step-forward"></i></button>
                <button class="btn btn-link text-muted"><i class="fas fa-redo"></i></button>
            </div>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>

        <div class="d-flex align-items-center justify-content-end" style="width: 30%;">
            <i class="fas fa-volume-up me-2 text-muted"></i>
            <input type="range" class="form-range w-50" id="volume">
        </div>
    </div>

    <script>
        const songs = [
            { title: "Midnight City", artist: "M83", img: "https://picsum.photos/seed/1/300" },
            { title: "Starboy", artist: "The Weeknd", img: "https://picsum.photos/seed/2/300" },
            { title: "Levitating", artist: "Dua Lipa", img: "https://picsum.photos/seed/3/300" },
            { title: "Heat Waves", artist: "Glass Animals", img: "https://picsum.photos/seed/4/300" },
            { title: "Blinding Lights", artist: "The Weeknd", img: "https://picsum.photos/seed/5/300" },
            { title: "Stay", artist: "The Kid LAROI", img: "https://picsum.photos/seed/6/300" },
            { title: "Industry Baby", artist: "Lil Nas X", img: "https://picsum.photos/seed/7/300" },
            { title: "Bad Habits", artist: "Ed Sheeran", img: "https://picsum.photos/seed/8/300" },
            { title: "Good 4 U", artist: "Olivia Rodrigo", img: "https://picsum.photos/seed/9/300" },
            { title: "Montero", artist: "Lil Nas X", img: "https://picsum.photos/seed/10/300" },
            { title: "Kiss Me More", artist: "Doja Cat", img: "https://picsum.photos/seed/11/300" },
            { title: "Save Your Tears", artist: "The Weeknd", img: "https://picsum.photos/seed/12/300" },
            { title: "Peaches", artist: "Justin Bieber", img: "https://picsum.photos/seed/13/300" },
            { title: "Butter", artist: "BTS", img: "https://picsum.photos/seed/14/300" },
            { title: "Drivers License", artist: "Olivia Rodrigo", img: "https://picsum.photos/seed/15/300" },
            { title: "Deja Vu", artist: "Olivia Rodrigo", img: "https://picsum.photos/seed/16/300" },
            { title: "Traitor", artist: "Olivia Rodrigo", img: "https://picsum.photos/seed/17/300" },
            { title: "Happier", artist: "Olivia Rodrigo", img: "https://picsum.photos/seed/18/300" },
            { title: "Brutal", artist: "Olivia Rodrigo", img: "https://picsum.photos/seed/19/300" },
            { title: "Jealousy", artist: "Olivia Rodrigo", img: "https://picsum.photos/seed/20/300" }
        ];

        const grid = document.getElementById('song-grid');
        
        songs.forEach(song => {
            const card = document.createElement('div');
            card.className = 'col';
            card.innerHTML = `
                <div class="song-card" cols-4-xl onclick="playSong('${song.title}', '${song.artist}', '${song.img}')">
                    <img src="${song.img}" alt="${song.title}">
                    <h6>${song.title}</h6>
                    <p>${song.artist}</p>
                </div>
            `;
            grid.appendChild(card);
        });

        const playBtn = document.getElementById('playBtn');
        let isPlaying = false;

        function playSong(title, artist, img) {
            document.getElementById('current-title').innerText = title;
            document.getElementById('current-artist').innerText = artist;
            document.getElementById('current-img').src = img;
            
            isPlaying = true;
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
        });
    </script>
</body>
</html>
