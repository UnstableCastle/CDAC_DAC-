<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
   <link rel="stylesheet" href="../css/table.css">
</head>
<body>

<div class="form-container">
    <h2>Registration Form</h2>
    
    <form action="#" method="POST">
        
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        z
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" required>
        </div>
        
        <div class="checkbox-group">
            <p>Courses</p>
            <label><input type="checkbox" name="course_java" value="Java"> Java</label>
            <label><input type="checkbox" name="course_css" value="Css"> CSS</label>
            <label><input type="checkbox" name="course_react" value="ReactJs"> ReactJs</label>
        </div>
        
        <div class="button-group">
            <input type="submit" class="submit-btn" value="Submit">
            <input type="reset" class="reset-btn" value="Reset">
        </div>

    </form>
</div>

</body>
</html>
