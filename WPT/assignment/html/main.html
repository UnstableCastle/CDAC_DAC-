<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam UI - Library Layout</title>
<link rel="stylesheet" href="../css/style.css">

</head>
<body>

    <div class="navbar">
        <div class="nav-left">
            <img src="../assets/logo.png" alt="" style="height: 30px; margin-right: 15px;"> <div class="logo">STEAM</div>
            
            <a href="#">STORE</a>
            
            <div class="dropdown">
                <button>Browse ▾</button>
                <div class="dropdown-menu">
                    <a href="#">Top Sellers</a>
                    <a href="#">New Releases</a>
                    <a href="#">Upcoming</a>
                </div>
            </div>
            
            <div class="dropdown">
                <button>Categories ▾</button>
                <div class="dropdown-menu">
                    <a href="#">Action</a>
                    <a href="#">Adventure</a>
                    <a href="#">RPG</a>
                </div>
            </div>
            
            <a href="#">COMMUNITY</a>
            <a href="#">CHAT</a>
            <a href="#">SUPPORT</a>
        </div>
        
        <div class="nav-right">
            <input type="text" placeholder="Search the store">
            <button class="search-btn">🔍</button>
        </div>
    </div>

    <div class="app-container">
        
        <div class="sidebar">
            <h3>Library</h3>
            <ul class="sidebar-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Collections</a></li>
                <li><a href="#">Downloads</a></li>
            </ul>
            <br>
            <h3>Games</h3>
            <ul class="sidebar-links">
                <li><a href="#">Action Games (12)</a></li>
                <li><a href="#">RPG Titles (4)</a></li>
                <li><a href="#">Favorites (2)</a></li>
            </ul>
        </div>

        <div class="main-content">
            
            <div class="hero">
                <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1091500/header.jpg" alt="game">
                <div class="hero-text">
                    <h1>SPRING SALE</h1>
                    <p>Discover amazing games</p>
                </div>
            </div>

            <div class="content-1-grid">
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/730/library_600x900.jpg" alt="Counter-Strike 2"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1091500/library_600x900.jpg" alt="Cyberpunk 2077"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1245620/library_600x900.jpg" alt="Elden Ring"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1086940/library_600x900.jpg" alt="Baldur's Gate 3"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/271590/library_600x900.jpg" alt="Grand Theft Auto V"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1174180/library_600x900.jpg" alt="Red Dead Redemption 2"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/570/library_600x900.jpg" alt="Dota 2"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/413150/library_600x900.jpg" alt="Stardew Valley"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1172470/library_600x900.jpg" alt="Apex Legends"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/252490/library_600x900.jpg" alt="Rust"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2535200/library_600x900.jpg" alt="Helldivers 2"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/578080/library_600x900.jpg" alt="PUBG: BATTLEGROUNDS"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/359550/library_600x900.jpg" alt="Rainbow Six Siege"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/292030/library_600x900.jpg" alt="The Witcher 3: Wild Hunt"></div>
                <div class="game-card"><img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/105600/library_600x900.jpg" alt="Terraria"></div>
            </div>

        </div>
    </div>

</body>
</html>
