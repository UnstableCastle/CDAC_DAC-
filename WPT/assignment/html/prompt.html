        let userEmail = prompt("Please enter your email address:");

        function displayEmailInfo(email) {
            let domain = email.indexOf("@");

            if (domain !== -1 && domain < email.length - 1) {
                let domainName = email.slice(domain + 1);


                document.write(`<h3>${email} is of **${domainName}**</h3>`);
            } else {
                document.write("<h3>Invalid email format entered.</h3>");
            }
        }

        if (userEmail) {
            displayEmailInfo(userEmail);
        }
