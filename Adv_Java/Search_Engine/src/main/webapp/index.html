<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Engine</title>

    <!-- Updated to a stable, highly reliable Bootstrap 5.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</head>

<body class="container mt-5">

    <div class="card shadow-sm m-auto" style="max-width: 500px;">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Search </h5>
        </div>
        <div class="card-body">

            <form action="serv1" method="post">

                <div class="input-group">
                    <span class="input-group-text">Search For</span> 
                    <input type="text" name="txtData" class="form-control" placeholder="Type your query..." required>
                </div>

                <div class="mt-3">
                    <p class="form-label mb-1 text-muted small">Select Search Engine:</p>
                    
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="engine" id="google" value="google" checked> 
                        <label class="form-check-label" for="google">Google</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="engine" id="yahoo" value="yahoo"> 
                        <label class="form-check-label" for="yahoo">Yahoo</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="engine" id="bing" value="bing"> 
                        <label class="form-check-label" for="bing">Bing</label>
                    </div>
                </div>

                <div class="d-grid mt-3">
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>

            </form>

        </div>
    </div>

</body>
</html>
