<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
	integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
	crossorigin="anonymous"></script>
</head>
<body>


	<div class="card">
		<div class="card-body">
			<form action="serv1" method="post">

				<div class="input-group flex-nowrap">

					<span class="input-group-text" id="addon-wrapping"> Enter
						Data </span> <input type="text" name="txtdata" class="form-control"
						placeholder="Search" aria-label="Username"
						aria-describedby="addon-wrapping">

				</div>

				<div class="mt-3">

					<div class="form-check form-check-inline">
						<input class="form-check-input" type="radio" name="searchEngine"
							id="google" value="Google"> <label
							class="form-check-label" for="google"> Google </label>
					</div>

					<div class="form-check form-check-inline">
						<input class="form-check-input" type="radio" name="searchEngine"
							id="yahoo" value="Yahoo"> <label class="form-check-label"
							for="yahoo"> Yahoo </label>
					</div>

					<div class="form-check form-check-inline">
						<input class="form-check-input" type="radio" name="searchEngine"
							id="bing" value="Bing"> <label class="form-check-label"
							for="bing"> Bing </label>
					</div>

				</div>

				<button type="submit" class="btn btn-primary mt-3">Submit</button>

			</form>
		</div>
	</div>



</body>
</html>
