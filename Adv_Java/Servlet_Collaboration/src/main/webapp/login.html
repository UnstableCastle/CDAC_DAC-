<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {

            background:url("https://images.pexels.com/photos/34726864/pexels-photo-34726864.jpeg");

            background-size:cover;
            background-position:center;

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            margin:0;
        }

        .login-card {

            background:rgba(123,169,218,0.9);

            padding:2rem;

            border-radius:15px;

            box-shadow:0px 4px 15px rgba(0,0,0,0.3);

            width:100%;
            max-width:400px;
        }

        .uimg {

            border-radius:50%;

            width:100px;
            height:100px;

            object-fit:cover;

            margin-bottom:15px;
        }

        .title {

            font-size:28px;

            margin-bottom:20px;
        }

        .login-btn {

            width:100%;
        }

        .error-msg {

            color:red;

            font-weight:bold;

            margin-bottom:15px;
        }

    </style>

</head>

<body>

    
          

   
        <form method="post"
              action="serv1">

            <img class="uimg"
            src="https://static.vecteezy.com/system/resources/thumbnails/022/014/184/small/user-icon-member-login-isolated-vector.jpg"
            alt="user">

            <div class="title">
                <strong>Login</strong>
            </div>

            <div class="mb-3 text-start">

                <label class="form-label">

                    User-name

                </label>

                <input type="text"
                       class="form-control"
                       name="txtUsername"
                       placeholder="Enter Username"
                       required>

            </div>

            <div class="mb-3 text-start">

                <label class="form-label">

                    Password

                </label>

                <input type="password"
                       class="form-control"
                       name="txtPassword"
                       placeholder="Enter Password"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-info login-btn">

                Login

            </button>

        </form>

    </div>

</body>

</html>
